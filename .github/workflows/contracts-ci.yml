name: Contracts CI

# Runs on every push/PR that touches the contracts directory or Cargo files.
# Also runs on pushes to main so the badge stays green.
on:
  push:
    branches:
      - main
    paths:
      - 'contracts/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/contracts-ci.yml'
  pull_request:
    branches:
      - main
    paths:
      - 'contracts/**'
      - 'Cargo.toml'
      - 'Cargo.lock'
      - '.github/workflows/contracts-ci.yml'

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # ── 1. Format check ─────────────────────────────────────────────────────────
  fmt:
    name: Rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain (stable + rustfmt)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          components: rustfmt

      - name: Check formatting
        run: cargo fmt --all -- --check

  # ── 2. Clippy lint ──────────────────────────────────────────────────────────
  clippy:
    name: Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain (stable + clippy + wasm target)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: wasm32v1-none
          components: clippy

      - name: Cache Rust build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-clippy-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-clippy-

      - name: Clippy (wasm target, deny warnings)
        run: cargo clippy --target wasm32v1-none --release -- -D warnings

      - name: Clippy (experimental feature, wasm target)
        run: cargo clippy --target wasm32v1-none --release --features experimental -- -D warnings

  # ── 3. Unit + integration tests ─────────────────────────────────────────────
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: wasm32v1-none

      - name: Cache Rust build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-test-

      - name: Run all tests (default features)
        run: cargo test --workspace --features testutils

      - name: Run tests with experimental feature
        run: cargo test --workspace --features testutils,experimental

      - name: Run tests with governance-token feature
        run: cargo test --workspace --features testutils,governance-token

  # ── 4. WASM build ───────────────────────────────────────────────────────────
  build-wasm:
    name: Build WASM
    runs-on: ubuntu-latest
    needs: [fmt, clippy, test]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain (stable + wasm target)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable
          targets: wasm32v1-none

      - name: Cache Rust build artifacts
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target/
          key: ${{ runner.os }}-cargo-wasm-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-wasm-

      - name: Build WASM (release)
        run: cargo build --release --target wasm32v1-none --workspace

      - name: Print WASM sizes
        run: |
          for f in target/wasm32v1-none/release/*.wasm; do
            echo "$(wc -c < "$f") bytes  $f"
          done

      - name: Upload WASM artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: wasm-${{ github.sha }}
          path: target/wasm32v1-none/release/*.wasm
          retention-days: 7

  # ── 5. Dependency audit ──────────────────────────────────────────────────────
  audit:
    name: Cargo audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install Rust toolchain (stable)
        uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # stable
        with:
          toolchain: stable

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Audit Cargo dependencies
        run: |
          cargo audit --deny warnings \
            --ignore RUSTSEC-2024-0388 \
            --ignore RUSTSEC-2024-0436 \
            --ignore RUSTSEC-2026-0097

  # ── 6. Event dictionary sync guard ──────────────────────────────────────────
  event-dictionary:
    name: Event dictionary sync
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Check every contractevent in events.rs has a dictionary entry
        run: |
          EVENT_RS=contracts/niffyinsure/src/events.rs
          DICT=docs/EVENT_DICTIONARY.md
          missing=0

          # Extract the second topic (event name) from each #[contractevent(...)] line.
          # Pattern: #[contractevent(topics = ["namespace", "event_name"])]
          while IFS= read -r name; do
            if ! grep -qF "\"${name}\"" "$DICT" && ! grep -qF "\`${name}\`" "$DICT"; then
              echo "::error file=${EVENT_RS}::Event '${name}' is defined in events.rs but missing from EVENT_DICTIONARY.md"
              missing=$((missing + 1))
            fi
          done < <(grep -oP '#\[contractevent\(topics = \["[^"]+", "\K[^"]+(?="\]\))' "$EVENT_RS")

          if [ "$missing" -gt 0 ]; then
            echo "::error::$missing event(s) missing from EVENT_DICTIONARY.md"
            exit 1
          fi
          echo "✅ All events documented in EVENT_DICTIONARY.md"
