name: CSP allowlist drift check

on:
  push:
    branches: [main]
    paths:
      - 'frontend/src/middleware.ts'
      - 'frontend/next.config.mjs'
      - 'docs/ops/csp-allowlist.md'
      - 'frontend/scripts/check-csp-allowlist.mjs'
  pull_request:
    branches: [main]
    paths:
      - 'frontend/src/middleware.ts'
      - 'frontend/next.config.mjs'
      - 'docs/ops/csp-allowlist.md'
      - 'frontend/scripts/check-csp-allowlist.mjs'
      - 'frontend/src/**'

permissions:
  contents: read

jobs:
  csp-allowlist-drift:
    name: CSP allowlist in sync with code
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version-file: .nvmrc

      - name: Check CSP allowlist is in sync
        run: node scripts/check-csp-allowlist.mjs
