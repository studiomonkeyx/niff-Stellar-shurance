name: Secrets rotation reminders

on:
  schedule:
    # Runs every Monday at 09:00 UTC
    - cron: '0 9 * * 1'
  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Print reminders without creating issues'
        required: false
        default: 'false'

permissions:
  contents: read
  issues: write

jobs:
  rotation-reminders:
    name: Check secret rotation deadlines
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Evaluate rotation deadlines and open reminder issues
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7
        with:
          script: |
            const DRY_RUN = context.payload.inputs?.dry_run === 'true';
            const now = new Date();

            // Secret rotation schedule (days between rotations).
            // Reminder fires when fewer than WARN_DAYS_BEFORE remain.
            const WARN_DAYS_BEFORE = 14;

            const secrets = [
              { name: 'JWT_SECRET',          periodDays: 90,  label: 'auth' },
              { name: 'JWT_SECRET_NEXT',      periodDays: 90,  label: 'auth', note: 'Remove after overlap window if set' },
              { name: 'DATABASE_URL creds',   periodDays: 90,  label: 'database' },
              { name: 'ADMIN_TOKEN',          periodDays: 30,  label: 'auth' },
              { name: 'PINATA_API_KEY/SECRET',periodDays: 90,  label: 'ipfs' },
              { name: 'HORIZON_API_KEY',      periodDays: 90,  label: 'rpc' },
              { name: 'CAPTCHA_SECRET_KEY',   periodDays: 180, label: 'support' },
              { name: 'IP_HASH_SALT',         periodDays: 365, label: 'privacy' },
              { name: 'WEBHOOK_SECRET_*',     periodDays: 90,  label: 'webhooks' },
            ];

            // Read last-rotated dates from a tracked file if it exists.
            // Format: JSON object { "JWT_SECRET": "2026-01-01", ... }
            let lastRotated = {};
            try {
              const { data } = await github.rest.repos.getContent({
                owner: context.repo.owner,
                repo: context.repo.repo,
                path: 'docs/ops/.secret-rotation-dates.json',
              });
              const content = Buffer.from(data.content, 'base64').toString('utf8');
              lastRotated = JSON.parse(content);
            } catch {
              core.info('No rotation-dates file found — using today as baseline for all secrets.');
            }

            const overdue = [];
            const upcoming = [];

            for (const secret of secrets) {
              const lastDate = lastRotated[secret.name]
                ? new Date(lastRotated[secret.name])
                : new Date(now.getTime() - secret.periodDays * 86400000); // treat as due now if unknown

              const nextDue = new Date(lastDate.getTime() + secret.periodDays * 86400000);
              const daysUntilDue = Math.ceil((nextDue - now) / 86400000);

              if (daysUntilDue <= 0) {
                overdue.push({ ...secret, daysOverdue: -daysUntilDue, nextDue });
              } else if (daysUntilDue <= WARN_DAYS_BEFORE) {
                upcoming.push({ ...secret, daysUntilDue, nextDue });
              }
            }

            if (overdue.length === 0 && upcoming.length === 0) {
              core.info('All secrets are within their rotation window. No reminders needed.');
              return;
            }

            const lines = ['## Secrets rotation reminder', ''];

            if (overdue.length > 0) {
              lines.push('### ⚠️ Overdue rotations');
              for (const s of overdue) {
                lines.push(`- **${s.name}** — overdue by ${s.daysOverdue} day(s) (was due ${s.nextDue.toISOString().slice(0,10)})${s.note ? ` — ${s.note}` : ''}`);
              }
              lines.push('');
            }

            if (upcoming.length > 0) {
              lines.push('### 🔔 Upcoming rotations (within 14 days)');
              for (const s of upcoming) {
                lines.push(`- **${s.name}** — due in ${s.daysUntilDue} day(s) (${s.nextDue.toISOString().slice(0,10)})${s.note ? ` — ${s.note}` : ''}`);
              }
              lines.push('');
            }

            lines.push('See [secrets-management-runbook.md](docs/ops/secrets-management-runbook.md) for rotation procedures.');

            const body = lines.join('\n');
            core.info(body);

            if (DRY_RUN) {
              core.info('Dry run — skipping issue creation.');
              return;
            }

            // Avoid duplicate open issues for the same week.
            const title = `[Ops] Secrets rotation reminder — ${now.toISOString().slice(0,10)}`;
            const { data: existing } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: 'secrets-rotation',
              per_page: 5,
            });

            if (existing.length > 0) {
              core.info(`Open rotation issue already exists (#${existing[0].number}). Skipping.`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body,
              labels: ['secrets-rotation', 'ops'],
            });
            core.info(`Created rotation reminder issue: ${title}`);
