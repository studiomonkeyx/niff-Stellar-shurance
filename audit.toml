# RUSTSEC-2024-0436 — paste 1.0.15: unmaintained; pulled in by wasmi_core/ark-ff via soroban-env-host
# RUSTSEC-2026-0097 — rand 0.8.5: unsound with custom logger; pulled in by soroban-sdk/soroban-env-host
